    <style>
      .material-symbols-outlined {
        font-variation-settings:
          "FILL" 0,
          "wght" 400,
          "GRAD" 0,
          "opsz" 24;
      }
      .material-symbols-outlined.fill {
        font-variation-settings: "FILL" 1;
      }
      /* Custom scrollbar for horizontal scrolling elements */
      .scrollbar-hide::-webkit-scrollbar {
        display: none;
      }
      .scrollbar-hide {
        -ms-overflow-style: none;
        scrollbar-width: none;

        <ol class="inline-flex items-center space-x-2">

          >

              <div class="w-2 h-2 rounded-full bg-outline-variant"></div>
              <div class="w-2 h-2 rounded-full bg-outline-variant"></div>

              <button

              <button

              class="font-label-caps text-label-caps text-on-surface-variant mb-4 uppercase tracking-widest"

            <div class="flex items-center border border-outline-variant w-fit">

              <span

            class="w-full bg-on-surface text-on-primary py-4 font-label-caps text-label-caps uppercase tracking-widest hover:opacity-90 transition-opacity border border-primary-container"

            Add to Cart

      </div>
    </main>
     <div id="ss-footer"></div>
    <script src="ss-navbar.js"></script>
